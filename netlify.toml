[build]
  command = "hugo --gc --minify"
  publish = "public"

[build.environment]
  HUGO_VERSION = "0.111.3"  # Using the latest stable version as of my knowledge
  NODE_VERSION = "18.0.0"
  GO_VERSION = "1.20"

[context.production.environment]
  HUGO_ENV = "production"
  HUGO_ENABLEGITINFO = "true"
